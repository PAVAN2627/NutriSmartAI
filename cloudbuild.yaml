steps:
  # Step 1: Write .env file from substitution variables so Vite picks them up
  - name: 'bash'
    args:
      - '-c'
      - |
        cat > .env << 'EOF'
        VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}
        VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}
        VITE_APPS_SCRIPT_URL=${_VITE_APPS_SCRIPT_URL}
        VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}
        EOF

  # Step 2: Build Docker image (Dockerfile will copy .env and npm run build will use it)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutrismartai/nutrismartai:$COMMIT_SHA'
      - '.'

  # Step 3: Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutrismartai/nutrismartai:$COMMIT_SHA'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'nutrismartai'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/nutrismartai/nutrismartai:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--allow-unauthenticated'

substitutions:
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _VITE_FIREBASE_MEASUREMENT_ID: ''
  _VITE_GEMINI_API_KEY: ''
  _VITE_APPS_SCRIPT_URL: ''
  _VITE_GOOGLE_MAPS_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
